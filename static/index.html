<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>哔哩音乐</title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>
  <div class="app">
    <!-- 搜索 -->
    <section id="tab-search" class="tab-panel active">
      <div class="card import-mode-card">
        <div class="card-header">
          <span class="material-symbols-outlined">link</span>
          <span class="card-title">导入歌曲</span>
        </div>
        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="url">
            <span class="material-symbols-outlined">link</span>
            URL 模式
          </button>
          <button class="mode-btn" data-mode="search">
            <span class="material-symbols-outlined">search</span>
            搜索模式
          </button>
        </div>
        <div id="mode-url" class="mode-panel">
          <div class="mode-input-row">
            <input id="url-input" type="text" placeholder="输入 B 站视频、分P、收藏夹或合集链接" />
            <button id="url-extract-btn" class="btn btn-primary">提取</button>
          </div>
          <div id="url-extract-status" class="muted" style="display:none"></div>
        </div>
        <div id="mode-search" class="mode-panel hidden">
          <div class="mode-input-row">
            <input id="search-input" type="text" placeholder="搜索 B 站视频/音乐…" />
            <button id="search-btn" class="btn btn-primary">搜索</button>
          </div>
        </div>
      </div>
      <!-- 导入操作条（搜索选中时浮现） -->
      <div id="import-bar" class="import-bar" style="display:none">
        <select id="import-playlist-select"></select>
        <input id="import-playlist" type="text" placeholder="新建歌单名" style="display:none" />
        <button id="import-only" class="btn">仅导入</button>
        <button id="import-download" class="btn btn-primary">导入并下载</button>
      </div>
      <div id="search-results" class="list"></div>
      <div id="search-more" class="center" style="display:none">
        <button id="search-more-btn" class="btn">加载更多</button>
      </div>
    </section>

    <!-- 收藏夹 -->
    <section id="tab-fav" class="tab-panel">
      <div id="fav-login-hint" class="hint" style="display:none">需要先在「设置」登录才能查看收藏夹。</div>
      <div id="fav-folders" class="list"></div>
      <div id="fav-content-wrap" style="display:none">
        <div class="bar">
          <button id="fav-back" class="btn">← 返回</button>
          <span id="fav-title" class="bar-title"></span>
          <label class="chk"><input type="checkbox" id="fav-as-playlist" checked /> 建为歌单</label>
          <button id="fav-import" class="btn btn-primary">整夹导入</button>
        </div>
        <div id="fav-content" class="list"></div>
      </div>
    </section>

    <!-- 下载 -->
    <section id="tab-download" class="tab-panel">
      <div id="download-empty" class="hint">暂无下载任务。</div>
      <div id="download-progress" style="display:none">
        <div class="progress-text"><span id="dl-current">0</span>/<span id="dl-total">0</span>
          （成功 <span id="dl-success">0</span>，失败 <span id="dl-failed">0</span>）</div>
        <div class="progress"><div id="dl-bar" class="progress-inner"></div></div>
        <button id="dl-clear" class="btn" style="margin-top:12px">清除</button>
      </div>
    </section>

    <!-- 设置 -->
    <section id="tab-settings" class="tab-panel">
      <div class="section-title">账号</div>
      <div id="account-logged-out">
        <div class="card">
          <h3>扫码登录</h3>
          <p class="muted">用「哔哩哔哩」App 扫码登录。</p>
          <button id="qr-start" class="btn btn-primary">生成二维码</button>
          <div id="qr-box" class="qr-box" style="display:none"></div>
          <div id="qr-status" class="muted"></div>
        </div>
        <div class="card">
          <h3>Cookie 登录</h3>
          <p class="muted">从浏览器登录 bilibili.com 后复制 Cookie（至少含 SESSDATA）。</p>
          <textarea id="cookie-input" placeholder="SESSDATA=xxx; bili_jct=yyy; DedeUserID=zzz"></textarea>
          <button id="cookie-login" class="btn btn-primary">用 Cookie 登录</button>
        </div>
      </div>
      <div id="account-logged-in" style="display:none">
        <div class="card center">
          <img id="account-face" class="avatar" alt="" />
          <div id="account-name" class="account-name"></div>
          <div id="account-vip" class="muted"></div>
          <button id="logout-btn" class="btn" style="margin-top:12px">退出登录</button>
        </div>
      </div>

      <div class="section-title">接口测试</div>
      <div class="card compact-card">
        <div class="field">
          <label>搜索接口测试</label>
          <div class="inline-bar">
            <input id="search-test-input" type="text" placeholder="输入搜索关键字" />
            <button id="search-test-btn" class="btn btn-primary">测试</button>
          </div>
          <div id="search-test-result" class="test-result" style="display:none"></div>
        </div>
      </div>

      <div class="section-title">播放与下载</div>
      <div class="field">
        <label>音质</label>
        <select id="set-quality">
          <option value="high">最高</option>
          <option value="medium">中（≤192K）</option>
          <option value="low">最低（省流）</option>
        </select>
      </div>
      <label class="chk"><input type="checkbox" id="set-dolby" /> 优先杜比全景声（需大会员）</label>
      <label class="chk"><input type="checkbox" id="set-hires" /> 优先 Hi-Res 无损（需大会员）</label>
      <div class="field">
        <label>下载路径模板</label>
        <input id="set-template" type="text" placeholder="bili/{artist}/{title}" />
      </div>
      <label class="chk"><input type="checkbox" id="set-embed" /> 下载时嵌入元数据</label>
      <div class="field">
        <label>下载间隔（秒）</label>
        <input id="set-interval" type="number" min="0" max="30" />
      </div>
    </section>

    <!-- 底部 Tab -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="search"><span class="material-symbols-outlined">search</span>搜索</button>
      <button class="tab-btn" data-tab="fav"><span class="material-symbols-outlined">star</span>收藏夹</button>
      <button class="tab-btn" data-tab="download"><span class="material-symbols-outlined">download</span>下载</button>
      <button class="tab-btn" data-tab="settings"><span class="material-symbols-outlined">settings</span>设置</button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script src="static/js/qrcode.min.mjs"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
